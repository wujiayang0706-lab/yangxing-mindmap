<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日本研究生申请规划平台 - 思维导图</title>
<style>
  :root {
    --purple: #534AB7; --purple-bg: #EEEDFE; --purple-text: #26215C;
    --teal: #0F6E56; --teal-bg: #E1F5EE; --teal-text: #04342C;
    --coral: #993C1D; --coral-bg: #FAECE7; --coral-text: #4A1B0C;
    --pink: #993556; --pink-bg: #FBEAF0; --pink-text: #4B1528;
    --amber: #854F0B; --amber-bg: #FAEEDA; --amber-text: #412402;
    --green: #3B6D11; --green-bg: #EAF3DE; --green-text: #173404;
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #042C53;
    --gray: #5F5E5A; --gray-bg: #F1EFE8; --gray-text: #2C2C2A;
  }

  * { box-sizing: border-box; }

  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
    background: #faf9f6;
    color: #2C2C2A;
    margin: 0;
    padding: 24px 16px 80px;
    line-height: 1.6;
  }

  .container { max-width: 760px; margin: 0 auto; }

  h1 {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    margin: 0 0 8px;
    color: #26215C;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #888780;
    margin: 0 0 16px;
  }

  .toolbar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }

  .toolbar button {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid #D3D1C7;
    background: #fff;
    color: #444441;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .toolbar button:hover { background: #F1EFE8; border-color: #B4B2A9; }
  .toolbar button.primary { background: #534AB7; color: #fff; border-color: #534AB7; }
  .toolbar button.danger { color: #993C1D; border-color: #F0997B; }

  .edit-hint {
    text-align: center;
    font-size: 12px;
    color: #993C1D;
    background: #FAECE7;
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 16px;
    display: none;
  }
  body.editing .edit-hint { display: block; }

  /* Node structure */
  .node {
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
    border: 1px solid transparent;
  }

  .node-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    font-weight: 600;
    font-size: 15px;
    gap: 8px;
  }

  .node-header:hover { filter: brightness(0.97); }

  .node-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .node-title-text { outline: none; }
  body.editing .node-title-text {
    background: rgba(255,255,255,0.6);
    border-radius: 4px;
    padding: 2px 6px;
    cursor: text;
  }
  body.editing .node-title-text:focus {
    background: #fff;
    box-shadow: 0 0 0 2px var(--accent-color, #534AB7);
  }

  .node-sub {
    font-size: 12px;
    font-weight: 400;
    opacity: 0.75;
    margin-left: 4px;
  }

  .chevron {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    transition: transform 0.25s ease;
    opacity: 0.6;
  }
  .node.collapsed > .node-header .chevron { transform: rotate(-90deg); }

  .node-body {
    padding: 4px 14px 14px;
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows 0.25s ease;
  }
  .node.collapsed > .node-body { grid-template-rows: 0fr; }
  .node-body-inner { overflow: hidden; min-height: 0; }
  .node.collapsed > .node-body > .node-body-inner { padding-top: 0; }

  /* Level 1 - main pillars */
  .lvl-1 > .node-header { background: var(--bg-color); color: var(--text-color); font-size: 16px; }
  .lvl-1 { border-color: var(--accent-color); }

  /* Level 2 - sub groups */
  .lvl-2 { margin: 10px 0; background: #fff; border: 1px solid #E5E3DA; }
  .lvl-2 > .node-header { font-size: 14px; padding: 10px 14px; }

  /* Leaves */
  .leaf-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
  }
  @media (max-width: 480px) { .leaf-grid { grid-template-columns: 1fr; } }

  .leaf {
    background: #fff;
    border: 1px solid #E5E3DA;
    border-radius: 8px;
    padding: 9px 14px;
    font-size: 13px;
    color: #444441;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .leaf-text { outline: none; flex: 1; min-width: 0; }
  body.editing .leaf-text {
    border-radius: 4px;
    padding: 1px 4px;
    cursor: text;
  }
  body.editing .leaf-text:focus {
    background: #fff;
    box-shadow: 0 0 0 2px #534AB7;
  }

  .del-btn {
    display: none;
    flex-shrink: 0;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: none;
    background: #F0997B;
    color: #fff;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    align-items: center;
    justify-content: center;
  }
  body.editing .del-btn { display: flex; }
  body.editing .leaf, body.editing .funnel-step, body.editing .note-item { padding-right: 8px; }

  .add-leaf-btn, .add-node-btn {
    display: none;
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px dashed #B4B2A9;
    background: transparent;
    color: #888780;
    cursor: pointer;
    width: 100%;
    margin-top: 6px;
  }
  body.editing .add-leaf-btn, body.editing .add-node-btn { display: block; }
  .add-leaf-btn:hover, .add-node-btn:hover { background: #F1EFE8; color: #444441; }

  .node-header-actions { display: none; align-items: center; gap: 4px; flex-shrink: 0; }
  body.editing .node-header-actions { display: flex; }
  .node-del-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.12);
    color: inherit;
    font-size: 13px;
    line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .node-del-btn:hover { background: rgba(0,0,0,0.22); }

  .funnel { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #444441; }
  .funnel-step {
    background: #fff; border: 1px solid #E5E3DA; border-radius: 8px;
    padding: 8px 14px; text-align: center;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .funnel-arrow { text-align: center; color: #B4B2A9; font-size: 12px; line-height: 1; }

  /* 记录区 */
  .notes-section { margin-top: 10px; border-top: 1px dashed #E5E3DA; padding-top: 8px; }
  .notes-title { font-size: 12px; color: #888780; margin-bottom: 6px; }
  .note-item {
    display: flex; align-items: center; gap: 8px;
    background: #F1EFE8; border-radius: 8px;
    padding: 8px 12px; margin-bottom: 6px; font-size: 13px;
  }
  .note-text { flex: 1; outline: none; min-width: 0; }
  body.editing .note-text { border-radius: 4px; padding: 1px 4px; cursor: text; }
  body.editing .note-text:focus { background: #fff; box-shadow: 0 0 0 2px #534AB7; }
  .note-date { font-size: 11px; color: #B4B2A9; white-space: nowrap; flex-shrink: 0; }
  .add-note-btn {
    display: none;
    font-size: 12px; padding: 8px 14px; border-radius: 8px;
    border: 1px dashed #B4B2A9; background: transparent; color: #888780;
    cursor: pointer; width: 100%;
  }
  body.editing .add-note-btn { display: block; }
  .add-note-btn:hover { background: #F1EFE8; color: #444441; }

  /* Color assignments */
  .c-purple { --bg-color: var(--purple-bg); --text-color: var(--purple-text); --accent-color: var(--purple); }
  .c-teal   { --bg-color: var(--teal-bg);   --text-color: var(--teal-text);   --accent-color: var(--teal); }
  .c-pink   { --bg-color: var(--pink-bg);   --text-color: var(--pink-text);   --accent-color: var(--pink); }
  .c-amber  { --bg-color: var(--amber-bg);  --text-color: var(--amber-text);  --accent-color: var(--amber); }
  .c-green  { --bg-color: var(--green-bg);  --text-color: var(--green-text);  --accent-color: var(--green); }

  .bar-row { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
  .bar {
    font-size: 12px; padding: 6px 10px; border-radius: 6px;
    color: #fff; font-weight: 600; white-space: nowrap;
  }
  .bar-coral { background: var(--coral); }
  .bar-pink  { background: var(--pink); }
  .bar-amber { background: var(--amber); }
  .bar-teal  { background: var(--teal); }
  .bar-green { background: var(--green); }

  footer { text-align: center; font-size: 11px; color: #B4B2A9; margin-top: 30px; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 10000; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: 12px; padding: 20px;
    max-width: 90vw; max-height: 80vh; overflow: auto;
    width: 100%; max-width: 480px;
  }
  .modal-box h3 { margin: 0 0 10px; font-size: 15px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
  .modal-actions button {
    font-size: 13px; padding: 8px 16px; border-radius: 8px;
    border: 1px solid #D3D1C7; background: #fff; cursor: pointer;
  }
  .modal-actions button.primary { background: #534AB7; color: #fff; border-color: #534AB7; }
  .modal-box p { font-size: 13px; color: #5F5E5A; }
</style>
</head>

<div id="lock-screen" style="position:fixed;inset:0;background:#faf9f6;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;padding:20px;text-align:center;">

<div class="container" style="display:none;" id="main-content">

  <h1>日本研究生申请规划平台</h1>
  <p class="subtitle">仰星留学 · 思维导图</p>

  <div class="toolbar">
    <button onclick="setAll(false)">展开全部</button>

    <button id="edit-toggle-btn" onclick="toggleEdit()">编辑模式</button>
  </div>
  <div class="toolbar" id="edit-toolbar" style="display:none;">
    <button class="primary" onclick="addTopNode()">+ 新增一级模块</button>
    <button onclick="exportData()">导出（保存到电脑）</button>
    <button class="danger" onclick="resetData()">恢复初始内容</button>
  </div>
  <div class="edit-hint">编辑模式已开启：点文字可改，点 × 删除，用"+"按钮新增。改动会自动保存在本机浏览器。完成后点"导出"下载新文件，上传覆盖GitHub上的index.html，其他设备才能看到更新。</div>

  <div id="tree"></div>

  <footer>仰星留学 · 日本研究生申请规划平台 · 点击标题展开或收起分支</footer>
</div>

<!-- Export modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal-box">
    <h3>导出文件</h3>
    <p>点击下方按钮下载更新后的 index.html 文件，然后到 GitHub 仓库用这个文件覆盖原来的 index.html（上传时直接拖入同名文件即可覆盖）。</p>
    <div class="modal-actions">
      <button onclick="closeExportModal()">取消</button>
      <button class="primary" onclick="downloadHtml()">下载 index.html</button>
    </div>
  </div>
</div>

</div>

        {id:"l113",text:"使用小程序"},{id:"l114",text:"专业评估"},{id:"l115",text:"签约规划"},
        {id:"l116",text:"长期培养"},{id:"l117",text:"申请成功"},{id:"l118",text:"转介绍裂变"}
      ]}
    ]
  }
];

var STORAGE_KEY = 'yangxing-mindmap-data';
var EDIT_KEY = 'yangxing-mindmap-editing';
var data = loadData();
var editing = false;
var uidCounter = 1000;

function uid() { uidCounter++; return 'id' + Date.now() + '_' + uidCounter; }

function loadData() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ============ 渲染 ============
function render() {
  var tree = document.getElementById('tree');
  tree.innerHTML = '';
  data.forEach(function(top) {
    tree.appendChild(renderTopNode(top));
  });
}

function renderTopNode(top) {
  var el = document.createElement('div');
  el.className = 'node lvl-1 ' + (top.color || 'c-purple') + (top.collapsed ? ' collapsed' : '');
  el.dataset.id = top.id;

  var header = document.createElement('div');
  header.className = 'node-header';
  header.onclick = function(e) { if (editing && e.target.closest('[contenteditable], .node-del-btn')) return; toggle(el); };

  var titleWrap = document.createElement('div');
  titleWrap.className = 'node-title';
  var titleSpan = document.createElement('span');
  titleSpan.className = 'node-title-text';
  titleSpan.textContent = top.title;
  titleSpan.contentEditable = editing;
  titleSpan.onblur = function() { top.title = titleSpan.textContent.trim(); saveData(); };
  titleWrap.appendChild(titleSpan);
  if (top.sub) {
    var subSpan = document.createElement('span');
    subSpan.className = 'node-sub';
    subSpan.textContent = top.sub;
    titleWrap.appendChild(subSpan);
  }
  header.appendChild(titleWrap);

  var actions = document.createElement('div');
  actions.className = 'node-header-actions';
  var delBtn = document.createElement('button');
  delBtn.className = 'node-del-btn';
  delBtn.textContent = '\u00d7';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    if (confirm('\u5220\u9664\u6574\u4e2a\u6a21\u5757\uff1f')) {
      data = data.filter(function(d){ return d.id !== top.id; });
      saveData(); render();
    }
  };
  actions.appendChild(delBtn);
  header.appendChild(actions);

  header.appendChild(makeChevron());
  el.appendChild(header);

  var body = document.createElement('div');
  body.className = 'node-body';
  var inner = document.createElement('div');
  inner.className = 'node-body-inner';

  if (top.bars && top.bars.length) {
    var barRow = document.createElement('div');
    barRow.className = 'bar-row';
    top.bars.forEach(function(b) {
      var bar = document.createElement('div');
      bar.className = 'bar ' + b.cls;
      bar.textContent = b.text;
      barRow.appendChild(bar);
    });
    inner.appendChild(barRow);
  }

  (top.children || []).forEach(function(child) {
    inner.appendChild(renderGroupNode(child, top));
  });

  var addGroupBtn = document.createElement('button');
  addGroupBtn.className = 'add-node-btn';
  addGroupBtn.textContent = '+ \u65b0\u589e\u5b50\u5206\u7ec4';
  addGroupBtn.onclick = function(e) {
    e.stopPropagation();
    if (!top.children) top.children = [];
    top.children.push({ id: uid(), title: '\u65b0\u5206\u7ec4', leaves: [{id: uid(), text:'\u65b0\u6761\u76ee'}] });
    saveData(); render();
  };
  inner.appendChild(addGroupBtn);

  body.appendChild(inner);
  el.appendChild(body);
  return el;
}

function renderGroupNode(group, top) {
  var el = document.createElement('div');
  el.className = 'node lvl-2' + (group.collapsed ? ' collapsed' : '');
  el.dataset.id = group.id;

  var header = document.createElement('div');
  header.className = 'node-header';
  header.onclick = function(e) { if (editing && e.target.closest('[contenteditable], .node-del-btn')) return; toggle(el); };

  var titleWrap = document.createElement('div');
  titleWrap.className = 'node-title';
  var titleSpan = document.createElement('span');
  titleSpan.className = 'node-title-text';
  titleSpan.textContent = group.title;
  titleSpan.contentEditable = editing;
  titleSpan.onblur = function() { group.title = titleSpan.textContent.trim(); saveData(); };
  titleWrap.appendChild(titleSpan);
  if (group.sub) {
    var subSpan = document.createElement('span');
    subSpan.className = 'node-sub';
    subSpan.textContent = group.sub;
    titleWrap.appendChild(subSpan);
  }
  header.appendChild(titleWrap);

  var actions = document.createElement('div');
  actions.className = 'node-header-actions';
  var delBtn = document.createElement('button');
  delBtn.className = 'node-del-btn';
  delBtn.textContent = '\u00d7';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    if (confirm('\u5220\u9664\u8be5\u5206\u7ec4\uff1f')) {
      top.children = top.children.filter(function(c){ return c.id !== group.id; });
      saveData(); render();
    }
  };
  actions.appendChild(delBtn);
  header.appendChild(actions);

  header.appendChild(makeChevron());
  el.appendChild(header);

  var body = document.createElement('div');
  body.className = 'node-body';
  var inner = document.createElement('div');
  inner.className = 'node-body-inner';

  if (group.type === 'funnel') {
    var funnel = document.createElement('div');
    funnel.className = 'funnel';
    (group.leaves || []).forEach(function(leaf, idx) {
      funnel.appendChild(renderFunnelStep(leaf, group));
      if (idx < group.leaves.length - 1) {
        var arrow = document.createElement('div');
        arrow.className = 'funnel-arrow';
        arrow.textContent = '\u2193';
        funnel.appendChild(arrow);
      }
    });
    inner.appendChild(funnel);
  } else {
    var grid = document.createElement('div');
    grid.className = 'leaf-grid';
    (group.leaves || []).forEach(function(leaf) {
      grid.appendChild(renderLeaf(leaf, group));
    });
    inner.appendChild(grid);
  }

  var addLeafBtn = document.createElement('button');
  addLeafBtn.className = 'add-leaf-btn';
  addLeafBtn.textContent = '+ \u65b0\u589e\u6761\u76ee';
  addLeafBtn.onclick = function(e) {
    e.stopPropagation();
    if (!group.leaves) group.leaves = [];
    group.leaves.push({ id: uid(), text: '\u65b0\u6761\u76ee' });
    saveData(); render();
  };
  inner.appendChild(addLeafBtn);

  // 记录区
  if ((group.notes && group.notes.length) || editing) {
    var notesSection = document.createElement('div');
    notesSection.className = 'notes-section';
    var notesTitle = document.createElement('div');
    notesTitle.className = 'notes-title';
    notesTitle.textContent = '\u8bb0\u5f55';
    notesSection.appendChild(notesTitle);
    (group.notes || []).forEach(function(note) {
      notesSection.appendChild(renderNote(note, group));
    });
    var addNoteBtn = document.createElement('button');
    addNoteBtn.className = 'add-note-btn';
    addNoteBtn.textContent = '+ \u6dfb\u52a0\u8bb0\u5f55';
    addNoteBtn.onclick = function(e) {
      e.stopPropagation();
      if (!group.notes) group.notes = [];
      var today = new Date();
      var dateStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
      group.notes.push({ id: uid(), text: '\u65b0\u8bb0\u5f55', date: dateStr });
      saveData(); render();
    };
    notesSection.appendChild(addNoteBtn);
    inner.appendChild(notesSection);
  }

  body.appendChild(inner);
  el.appendChild(body);
  return el;
}

function renderLeaf(leaf, group) {
  var el = document.createElement('div');
  el.className = 'leaf';
  var span = document.createElement('span');
  span.className = 'leaf-text';
  span.textContent = leaf.text;
  span.contentEditable = editing;
  span.onblur = function() { leaf.text = span.textContent.trim(); saveData(); };
  el.appendChild(span);

  var del = document.createElement('button');
  del.className = 'del-btn';
  del.textContent = '\u00d7';
  del.onclick = function(e) {
    e.stopPropagation();
    group.leaves = group.leaves.filter(function(l){ return l.id !== leaf.id; });
    saveData(); render();
  };
  el.appendChild(del);
  return el;
}

function renderFunnelStep(leaf, group) {
  var el = document.createElement('div');
  el.className = 'funnel-step';
  var span = document.createElement('span');
  span.className = 'leaf-text';
  span.textContent = leaf.text;
  span.contentEditable = editing;
  span.onblur = function() { leaf.text = span.textContent.trim(); saveData(); };
  el.appendChild(span);

  var del = document.createElement('button');
  del.className = 'del-btn';
  del.textContent = '\u00d7';
  del.onclick = function(e) {
    e.stopPropagation();
    group.leaves = group.leaves.filter(function(l){ return l.id !== leaf.id; });
    saveData(); render();
  };
  el.appendChild(del);
  return el;
}

function renderNote(note, group) {
  var el = document.createElement('div');
  el.className = 'note-item';

  var span = document.createElement('span');
  span.className = 'note-text';
  span.textContent = note.text;
  span.contentEditable = editing;
  span.onblur = function() { note.text = span.textContent.trim(); saveData(); };
  el.appendChild(span);

  var dateSpan = document.createElement('span');
  dateSpan.className = 'note-date';
  dateSpan.textContent = note.date || '';
  dateSpan.contentEditable = editing;
  dateSpan.onblur = function() { note.date = dateSpan.textContent.trim(); saveData(); };
  el.appendChild(dateSpan);

  var del = document.createElement('button');
  del.className = 'del-btn';
  del.textContent = '\u00d7';
  del.onclick = function(e) {
    e.stopPropagation();
    group.notes = group.notes.filter(function(n){ return n.id !== note.id; });
    saveData(); render();
  };
  el.appendChild(del);
  return el;
}

function makeChevron() {
  var ns = 'http://www.w3.org/2000/svg';
  var svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('class', 'chevron');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '2');
  var poly = document.createElementNS(ns, 'polyline');
  poly.setAttribute('points', '6 9 12 15 18 9');
  svg.appendChild(poly);
  return svg;
}

// ============ 折叠/展开 ============
function toggle(node) {
  node.classList.toggle('collapsed');
  var id = node.dataset.id;
  var isCollapsed = node.classList.contains('collapsed');
  data.forEach(function(top) {
    if (top.id === id) top.collapsed = isCollapsed;
    (top.children||[]).forEach(function(g){ if (g.id === id) g.collapsed = isCollapsed; });
  });
  saveData();
}
function setAll(collapsed) {
  data.forEach(function(top) {
    top.collapsed = collapsed;
    (top.children||[]).forEach(function(g){ g.collapsed = collapsed; });
  });
  saveData(); render();
}

// ============ \u7f16\u8f91\u6a21\u5f0f ============
function toggleEdit() {
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  document.getElementById('edit-toolbar').style.display = editing ? 'flex' : 'none';
  document.getElementById('edit-toggle-btn').textContent = editing ? '\u9000\u51fa\u7f16\u8f91' : '\u7f16\u8f91\u6a21\u5f0f';
  document.getElementById('edit-toggle-btn').className = editing ? 'primary' : '';
  localStorage.setItem(EDIT_KEY, editing ? 'yes' : 'no');
  render();
}

function addTopNode() {
  var colors = ['c-purple','c-teal','c-pink','c-amber','c-green'];
  var color = colors[data.length % colors.length];
  data.push({
    id: uid(), color: color, title: '\u65b0\u6a21\u5757', sub: '',
    children: [{ id: uid(), title: '\u65b0\u5206\u7ec4', leaves: [{id: uid(), text:'\u65b0\u6761\u76ee'}] }]
  });
  saveData(); render();
}

function resetData() {
  if (!confirm('\u786e\u5b9a\u8981\u6062\u590d\u5230\u521d\u59cb\u5185\u5bb9\u5417\uff1f\u8fd9\u4f1a\u6e05\u9664\u4f60\u5728\u672c\u673a\u505a\u7684\u6240\u6709\u4fee\u6539\u3002')) return;
  data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  saveData(); render();
}

// ============ \u5bfc\u51fa ============
function exportData() {
  document.getElementById('export-modal').classList.add('show');
}
function closeExportModal() {
  document.getElementById('export-modal').classList.remove('show');
}
function downloadHtml() {
  var html = document.documentElement.outerHTML;
  var dataStr = JSON.stringify(data, null, 2);
  var newHtml = '<!DOCTYPE html>\n' + html.replace(
    /var DEFAULT_DATA = [\s\S]*?\];(\s*\n)/,
    'var DEFAULT_DATA = ' + dataStr + ';$1'
  );
  var blob = new Blob([newHtml], {type: 'text/html;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  closeExportModal();
}

// ============ \u5bc6\u7801\u9501 ============
function checkPw() {
  var input = document.getElementById('pw-input').value;
  if (input === 'japan') {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    sessionStorage.setItem('mindmap-unlocked', 'yes');
    init();
  } else {
    document.getElementById('pw-error').style.display = 'block';
  }
}

function init() {
  if (localStorage.getItem(EDIT_KEY) === 'yes') {
    editing = true;
    document.body.classList.add('editing');
    document.getElementById('edit-toolbar').style.display = 'flex';
    document.getElementById('edit-toggle-btn').textContent = '\u9000\u51fa\u7f16\u8f91';
    document.getElementById('edit-toggle-btn').className = 'primary';
  }
  render();
}

if (sessionStorage.getItem('mindmap-unlocked') === 'yes') {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  init();
}
</script>
